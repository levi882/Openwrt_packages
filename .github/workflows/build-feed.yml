name: build-feed

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: build-feed
  cancel-in-progress: false

env:
  CF_PAGES_PROJECT: openwrt-packages

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - openwrt_branch: openwrt-25.12
            openwrt_arch: x86_64
            feed_name: myfeed
    env:
      OPENWRT_BRANCH: ${{ matrix.target.openwrt_branch }}
      OPENWRT_ARCH: ${{ matrix.target.openwrt_arch }}
      FEED_NAME: ${{ matrix.target.feed_name }}

    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: create feed directory
        run: mkdir -p "bin/packages/${OPENWRT_ARCH}/${FEED_NAME}"

      - name: add Aurora release apks
        run: bash .github/scripts/download-aurora-apks.sh "bin/packages/${OPENWRT_ARCH}/${FEED_NAME}"

      - name: add Lucky release apks
        run: bash .github/scripts/download-lucky-apks.sh "bin/packages/${OPENWRT_ARCH}/${FEED_NAME}"

      - name: add EasyTier release apks
        run: bash .github/scripts/download-easytier-apks.sh "bin/packages/${OPENWRT_ARCH}/${FEED_NAME}"

      - name: add rtp2httpd release apks
        run: bash .github/scripts/download-rtp2httpd-apks.sh "bin/packages/${OPENWRT_ARCH}/${FEED_NAME}"

      - name: add FakeHTTP release apks
        run: bash .github/scripts/download-fakehttp-apks.sh "bin/packages/${OPENWRT_ARCH}/${FEED_NAME}"

      - name: add SmartDNS release apks
        run: bash .github/scripts/download-smartdns-apks.sh "bin/packages/${OPENWRT_ARCH}/${FEED_NAME}"

      - name: add Bandix release apks
        run: bash .github/scripts/download-bandix-apks.sh "bin/packages/${OPENWRT_ARCH}/${FEED_NAME}"

      - name: add Nikki release apks
        run: bash .github/scripts/download-nikki-apks.sh "bin/packages/${OPENWRT_ARCH}/${FEED_NAME}"

      - name: cache OpenWrt SDK
        uses: actions/cache@v4
        with:
          path: .openwrt-sdk-cache
          key: openwrt-sdk-${{ env.OPENWRT_BRANCH }}-${{ env.OPENWRT_ARCH }}-v1

      - name: reindex apk feed
        run: bash .github/scripts/reindex-apk-feed.sh "bin/packages/${OPENWRT_ARCH}/${FEED_NAME}"
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}

      - name: prepare feed artifact
        run: |
          mkdir -p "public/${OPENWRT_BRANCH}/${OPENWRT_ARCH}"
          cp -a "bin/packages/${OPENWRT_ARCH}/${FEED_NAME}" "public/${OPENWRT_BRANCH}/${OPENWRT_ARCH}/"
          find public -maxdepth 4 -type f | sort

      - name: upload feed artifact
        uses: actions/upload-artifact@v4
        with:
          name: feed-${{ matrix.target.openwrt_branch }}-${{ matrix.target.openwrt_arch }}-${{ matrix.target.feed_name }}
          path: public
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: download feed artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: feed-*
          path: public
          merge-multiple: true

      - name: prepare pages
        run: |
          test -s public-key.pem
          cp public-key.pem public/public-key.pem
          python3 .github/scripts/generate-index.py public "Levi's Feed"
          find public -maxdepth 4 -type f | sort

      - name: deploy to cloudflare pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name=${{ env.CF_PAGES_PROJECT }}
